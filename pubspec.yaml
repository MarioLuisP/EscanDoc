name: escandoc
description: "EscanDoc - Scanner de documentos con notas y vencimientos integrados. Diseñado para personas mayores."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ═══════════════════════════════════════════════════════════════════════════
  # LOCALIZATION
  # ═══════════════════════════════════════════════════════════════════════════
  intl: ^0.20.2
  easy_localization: ^3.0.7             # Localization simplificada

  # ═══════════════════════════════════════════════════════════════════════════
  # STATE MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════
  provider: ^6.1.2

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE & STORAGE
  # ═══════════════════════════════════════════════════════════════════════════
  sqflite: ^2.4.2                    # SQLite local
  sqlite3_flutter_libs: ^0.5.41      # SQLite con FTS para tests (via sqflite_common_ffi)
  path_provider: ^2.1.5              # Rutas de storage
  shared_preferences: ^2.3.2         # Preferencias (onboarding, settings)
  file_picker: ^10.3.10              # Seleccionar archivos/imágenes de galería (importar)
  receive_sharing_intent: ^1.8.1    # Recibir archivos compartidos desde otras apps (intent)

  # ═══════════════════════════════════════════════════════════════════════════
  # DOCUMENT SCANNING (UI Nativa - ML Kit Android / VisionKit iOS)
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_doc_scanner: ^0.0.17       # Scanner nativo con detección de bordes
  
  # ═══════════════════════════════════════════════════════════════════════════
  # OCR & ML (Post-scan processing)
  # ═══════════════════════════════════════════════════════════════════════════
  google_mlkit_text_recognition: ^0.15.0  # OCR offline después del escaneo
  tflite_flutter: ^0.12.1                 # TensorFlow Lite para clasificación de imágenes

  # ═══════════════════════════════════════════════════════════════════════════
  # IMAGE & PDF PROCESSING
  # ═══════════════════════════════════════════════════════════════════════════
  image: ^4.5.4                     # Procesamiento de imagen (normalización)
  flutter_image_compress: ^2.4.0    # Compresión nativa (thumbnails optimizados)
  pdf: ^3.11.3                       # Generación de PDFs
  pdf_to_image_converter: ^0.0.5    # Conversión PDF→imagen (importar)
  printing: ^5.14.2                  # Vista previa e impresión de PDFs
  pdfrx: ^2.2.24                     # Visualización de PDFs con zoom
  gal: ^2.3.0                        # Guardar imágenes en galería (feature: escanear fotos)

  # ═══════════════════════════════════════════════════════════════════════════
  # VOICE SEARCH
  # ═══════════════════════════════════════════════════════════════════════════
  speech_to_text: ^7.3.0             # Búsqueda por voz (HU-007)

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS (Fase 2 - Vencimientos)
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_local_notifications: ^18.0.1  # Notificaciones locales

  # ═══════════════════════════════════════════════════════════════════════════
  # MARKDOWN RENDERING
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_markdown_plus: ^1.0.7        # Renderizado Markdown en UI
  google_fonts: ^6.2.1                 # Dancing Script para pergamino de notas

  # ═══════════════════════════════════════════════════════════════════════════
  # UTILITIES
  # ═══════════════════════════════════════════════════════════════════════════
  path: ^1.9.1                       # Manipulación de rutas
  uuid: ^4.5.1                       # Generación de IDs únicos
  permission_handler: ^12.0.1        # Manejo de permisos (camera, microphone)

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ═══════════════════════════════════════════════════════════════════════════
  # TESTING
  # ═══════════════════════════════════════════════════════════════════════════
  mocktail: ^1.0.4                   # Mocks para tests
  sqflite_common_ffi: ^2.3.4         # SQLite para tests en desktop
  sqlite3: ^2.4.6                    # Para configurar SQLite con FTS en tests

  # ═══════════════════════════════════════════════════════════════════════════
  # APP ICON
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_launcher_icons: ^0.14.4    # Genera iconos para Android e iOS

  # ═══════════════════════════════════════════════════════════════════════════
  # LINTING
  # ═══════════════════════════════════════════════════════════════════════════
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/onboarding/
    - assets/l10n/
    - assets/models/

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

# ═══════════════════════════════════════════════════════════════════════════════
# APP ICON CONFIG (flutter_launcher_icons)
# ═══════════════════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true             # Apple App Store no permite alpha en iconos
  # Adaptive icon Android 8+ (API 26+): fondo verde del logo + logo como foreground
  adaptive_icon_background: "#388E3C"
  adaptive_icon_foreground: "assets/images/logo.png"

# ═══════════════════════════════════════════════════════════════════════════════
# NOTAS DE ARQUITECTURA
# ═══════════════════════════════════════════════════════════════════════════════
#
# FLUJO DE ESCANEO:
# 1. Usuario toca "ESCANEAR" (UI propia, elderly-friendly)
# 2. Se abre flutter_doc_scanner (UI nativa ML Kit/VisionKit)
# 3. Usuario escanea con detección automática de bordes
# 4. Imagen retorna a la app
# 5. google_mlkit_text_recognition extrae texto (OCR)
# 6. DocumentClassifier detecta tipo y genera nombre
# 7. Se guarda en SQLite con FTS5
#
# DECISIONES TÉCNICAS (21 Enero 2026):
# - Scanner: UI nativa (precisión máxima, UX probada por millones)
# - OCR: Post-scan con ML Kit Text Recognition
# - State: Provider (simple, suficiente para MVP)
# - DB: SQLite + FTS5 (schema ya documentado)
# - NO incluimos: camera, image_picker, edge_detection (flutter_doc_scanner los reemplaza)
#
# ═══════════════════════════════════════════════════════════════════════════════
