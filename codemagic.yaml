workflows:

  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      # Combo EXACTO de la build de simulador que SÍ funcionó (9-may-2026, commit
      # db5ff2d → generó Runner.app 74MB). Confirmado en el log de esa build:
      # Flutter 3.41.9 + Xcode 26.4.1. Reproducimos eso, sin adivinar.
      flutter: 3.41.9
      xcode: 26.4
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: cd ios && pod install && cd ..
      - name: Build iOS for simulator
        script: flutter build ios --debug --simulator --no-codesign
    artifacts:
      - build/ios/iphonesimulator/Runner.app

  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-api
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.passalia.escandoc"
      flutter: 3.41.0
      xcode: 26.2
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    scripts:
      - name: Enable Push Notifications entitlement
        script: |
          if [ ! -f "ios/Runner/Runner.entitlements" ]; then
            cat > ios/Runner/Runner.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          ENTITLEMENTS
          else
            /usr/libexec/PlistBuddy -c "Add :aps-environment string production" ios/Runner/Runner.entitlements 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :aps-environment production" ios/Runner/Runner.entitlements
          fi
          echo "Runner.entitlements:"
          cat ios/Runner/Runner.entitlements
      - name: Link entitlements to Xcode project
        script: |
          ENTITLEMENTS_LINE="CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;"
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          if ! grep -q "$ENTITLEMENTS_LINE" "$PROJECT_FILE"; then
            sed -i.bak "/PRODUCT_BUNDLE_IDENTIFIER = com.passalia.escandoc;/a\\
                    $ENTITLEMENTS_LINE" "$PROJECT_FILE"
            echo "Entitlements linkeado al proyecto"
          else
            echo "Entitlements ya estaba linkeado"
          fi
      - name: Set Export Compliance
        script: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/Runner/Info.plist
          echo "Export Compliance configurado"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        # testFlightInternalTestingOnly: la build va SOLO a testers internos → no
        # dispara el beta review de Apple (que exige "test information" y hacía fallar
        # el último paso). Se inyecta en el export_options.plist que usa el Build IPA.
        script: |
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Install CocoaPods (genera el workspace antes del build)
        # `flutter build ipa` chequea la integración SPM ANTES de crear el
        # workspace con pods, y Runner.xcworkspace no está commiteado → falla con
        # "Xcode workspace not found". Correr pod install acá lo genera a tiempo.
        # (SPM ya está desactivado desde pubspec.yaml → flutter.config)
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
